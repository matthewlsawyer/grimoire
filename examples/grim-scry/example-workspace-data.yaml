version: 1

repository:
  name: next.js
  root: "."
  summary: >
    A pnpm + Cargo monorepo for the Next.js framework: core `next` package,
    Turbopack (default bundler), Rust/SWC bindings, tests, examples, docs,
    and contributor agent skills / CI automation.

entities:

  - id: dir.packages
    kind: directory
    name: packages/
    path: packages/
    purpose: Published npm packages (core `next` and siblings)

  - id: dir.packages-next
    kind: directory
    name: next/
    path: packages/next/
    purpose: Core Next.js framework package

  - id: dir.turbopack
    kind: directory
    name: turbopack/
    path: turbopack/
    purpose: Turbopack bundler (Rust) subtree

  - id: dir.rspack
    kind: directory
    name: rspack/
    path: rspack/
    purpose: Rspack bundler integration (alternate)

  - id: dir.crates
    kind: directory
    name: crates/
    path: crates/
    purpose: Rust crates for Next.js / SWC bindings

  - id: dir.test
    kind: directory
    name: test/
    path: test/
    purpose: Integration and mode-matrix test suites

  - id: dir.examples
    kind: directory
    name: examples/
    path: examples/
    purpose: Example Next.js applications

  - id: dir.docs
    kind: directory
    name: docs/
    path: docs/
    purpose: Product documentation (app/pages/architecture)

  - id: dir.scripts
    kind: directory
    name: scripts/
    path: scripts/
    purpose: Build and maintenance scripts

  - id: dir.agents-skills
    kind: directory
    name: .agents/skills/
    path: .agents/skills/
    purpose: Contributor agent skills

  - id: dir.skills
    kind: directory
    name: skills/
    path: skills/
    purpose: Product adoption agent skills

  - id: concept.monorepo
    kind: concept
    name: Monorepo
    description: pnpm workspaces plus Cargo workspace shipping Next.js

  - id: concept.core-next
    kind: concept
    name: Core Next.js package
    description: Main `next` framework and CLI entrypoints

  - id: concept.bundler
    kind: concept
    name: Bundler tooling
    description: Turbopack default; Webpack and Rspack still selectable

  - id: concept.native
    kind: concept
    name: Native / SWC layer
    description: Rust crates and NAPI bindings behind transforms

  - id: concept.dev-loop
    kind: concept
    name: Dev / build / test loop
    description: Watch build, mode-specific tests, full bootstrap builds

  - id: entry.next-dev
    kind: entrypoint
    name: next-dev
    path: packages/next/src/cli/next-dev.ts

  - id: entry.next-build
    kind: entrypoint
    name: next-build
    path: packages/next/src/cli/next-build.ts

  - id: entry.next-start
    kind: entrypoint
    name: next-start
    path: packages/next/src/cli/next-start.ts

  - id: script.dev
    kind: script
    name: next watch build
    command: pnpm --filter=next dev

  - id: script.build-all
    kind: script
    name: build-all
    command: pnpm build-all

  - id: script.test-dev-turbo
    kind: script
    name: test-dev-turbo
    command: pnpm test-dev-turbo

  - id: instruction.agents
    kind: instruction
    name: AGENTS.md
    path: AGENTS.md

  - id: instruction.ci-build-test
    kind: instruction
    name: build_and_test
    path: .github/workflows/build_and_test.yml

relationships:

  - type: contains
    from: repository
    to: dir.packages
  - type: contains
    from: repository
    to: dir.turbopack
  - type: contains
    from: repository
    to: dir.rspack
  - type: contains
    from: repository
    to: dir.crates
  - type: contains
    from: repository
    to: dir.test
  - type: contains
    from: repository
    to: dir.examples
  - type: contains
    from: repository
    to: dir.docs
  - type: contains
    from: repository
    to: dir.scripts
  - type: contains
    from: repository
    to: dir.agents-skills
  - type: contains
    from: repository
    to: dir.skills
  - type: contains
    from: dir.packages
    to: dir.packages-next

  - type: contains
    from: concept.monorepo
    to: concept.core-next
  - type: contains
    from: concept.monorepo
    to: concept.bundler
  - type: contains
    from: concept.monorepo
    to: concept.native
  - type: contains
    from: concept.monorepo
    to: concept.dev-loop

  - type: implements
    from: dir.packages-next
    to: concept.core-next
  - type: implements
    from: dir.turbopack
    to: concept.bundler
  - type: implements
    from: dir.rspack
    to: concept.bundler
  - type: implements
    from: dir.crates
    to: concept.native
  - type: implements
    from: dir.scripts
    to: concept.dev-loop
  - type: implements
    from: dir.test
    to: concept.dev-loop

  - type: contains
    from: repository
    to: instruction.agents
  - type: contains
    from: repository
    to: instruction.ci-build-test
  - type: contains
    from: repository
    to: script.dev
  - type: contains
    from: repository
    to: script.build-all
  - type: contains
    from: repository
    to: script.test-dev-turbo
  - type: contains
    from: repository
    to: entry.next-dev
  - type: contains
    from: repository
    to: entry.next-build
  - type: contains
    from: repository
    to: entry.next-start

  - type: uses
    from: instruction.agents
    to: script.dev
  - type: uses
    from: instruction.agents
    to: script.build-all
  - type: uses
    from: instruction.agents
    to: script.test-dev-turbo
  - type: uses
    from: instruction.ci-build-test
    to: script.build-all

  - type: invokes
    from: script.dev
    to: entry.next-dev
  - type: invokes
    from: script.build-all
    to: entry.next-build
  - type: invokes
    from: script.test-dev-turbo
    to: entry.next-dev
  - type: depends_on
    from: script.test-dev-turbo
    to: script.dev

evidence:

  - entity: concept.monorepo
    sources:
      - AGENTS.md
      - pnpm-workspace.yaml
      - Cargo.toml
  - entity: concept.core-next
    sources:
      - AGENTS.md
      - packages/next/
  - entity: concept.bundler
    sources:
      - AGENTS.md
      - turbopack/
      - rspack/
  - entity: concept.native
    sources:
      - AGENTS.md
      - crates/
      - Cargo.toml
  - entity: concept.dev-loop
    sources:
      - AGENTS.md
      - package.json

  - entity: entry.next-dev
    sources:
      - packages/next/src/cli/next-dev.ts
  - entity: entry.next-build
    sources:
      - packages/next/src/cli/next-build.ts
  - entity: entry.next-start
    sources:
      - packages/next/src/cli/next-start.ts

  - entity: script.dev
    sources:
      - package.json
      - AGENTS.md
  - entity: script.build-all
    sources:
      - package.json
      - AGENTS.md
  - entity: script.test-dev-turbo
    sources:
      - package.json
      - AGENTS.md

  - entity: instruction.agents
    sources:
      - AGENTS.md
  - entity: instruction.ci-build-test
    sources:
      - .github/workflows/build_and_test.yml

observations:
  - AGENTS.md is the primary contributor map; CLAUDE.md symlinks to it.
  - Turbopack is the default bundler for `next dev` and `next build`; Webpack/Rspack remain selectable.
  - Core CLI lives under `packages/next/src/cli/` (`next-dev`, `next-build`, `next-start`).
  - Dev loop favors `pnpm --filter=next dev` plus mode-specific `test-*-turbo|webpack|rspack` scripts.
  - Dual skill surfaces: `.agents/skills/` (contributor) and root `skills/` (product adoption).
  - CI hub workflow is `.github/workflows/build_and_test.yml` on canary push and PRs.
