version: 1

repository:
  name: tailscale
  root: .
  summary: >
    Open-source Tailscale client code: the tailscaled daemon and tailscale CLI
    for private WireGuard-based mesh networking on Linux, Windows, macOS, and
    other platforms. Go monorepo with modular features, DERP relay, embedded
    tsnet library, Kubernetes operator, and appliance images.

