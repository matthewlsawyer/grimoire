version: 1

repository:
  name: next.js
  root: .
  summary: >-
    pnpm monorepo for the Next.js React framework and related npm packages.
    Core framework in packages/next; Rust tooling in turbopack/, crates/, and
    packages/next-swc. Turbopack is the default dev and build bundler.

entities:
  - id: dir.packages
    kind: directory
    name: packages
    path: packages
    purpose: Published npm packages

  - id: dir.packages.next
    kind: directory
    name: next
    path: packages/next
    purpose: Main Next.js framework (published as next)

  - id: dir.packages.next.src
    kind: directory
    name: src
    path: packages/next/src

  - id: dir.packages.create-next-app
    kind: directory
    name: create-next-app
    path: packages/create-next-app
    purpose: create-next-app CLI tool

  - id: dir.packages.next-swc
    kind: directory
    name: next-swc
    path: packages/next-swc
    purpose: Native Rust SWC bindings

  - id: dir.packages.font
    kind: directory
    name: font
    path: packages/font
    purpose: next/font implementation

  - id: dir.packages.eslint-plugin-next
    kind: directory
    name: eslint-plugin-next
    path: packages/eslint-plugin-next
    purpose: ESLint rules for Next.js

  - id: dir.packages.third-parties
    kind: directory
    name: third-parties
    path: packages/third-parties
    purpose: Third-party script integrations

  - id: dir.turbopack
    kind: directory
    name: turbopack
    path: turbopack
    purpose: Turbopack bundler (Rust git subtree)

  - id: dir.crates
    kind: directory
    name: crates
    path: crates
    purpose: Rust crates for Next.js SWC bindings

  - id: dir.rspack
    kind: directory
    name: rspack
    path: rspack

  - id: dir.test
    kind: directory
    name: test
    path: test
    purpose: All test suites

  - id: dir.test.e2e
    kind: directory
    name: e2e
    path: test/e2e

  - id: dir.test.development
    kind: directory
    name: development
    path: test/development
    purpose: Dev server tests

  - id: dir.test.production
    kind: directory
    name: production
    path: test/production
    purpose: Production build tests

  - id: dir.test.unit
    kind: directory
    name: unit
    path: test/unit
    purpose: Unit tests (fast, no browser)

  - id: dir.examples
    kind: directory
    name: examples
    path: examples
    purpose: Example Next.js applications

  - id: dir.docs
    kind: directory
    name: docs
    path: docs
    purpose: Documentation

  - id: dir.docs.app
    kind: directory
    name: 01-app
    path: docs/01-app

  - id: dir.docs.pages
    kind: directory
    name: 02-pages
    path: docs/02-pages

  - id: dir.scripts
    kind: directory
    name: scripts
    path: scripts
    purpose: Build and maintenance scripts

  - id: dir.evals
    kind: directory
    name: evals
    path: evals
    purpose: Agent evals for Next.js

  - id: dir.bench
    kind: directory
    name: bench
    path: bench

  - id: dir.apps
    kind: directory
    name: apps
    path: apps

  - id: dir.errors
    kind: directory
    name: errors
    path: errors

  - id: dir.agents
    kind: directory
    name: .agents
    path: .agents

  - id: dir.github
    kind: directory
    name: .github
    path: .github

  - id: concept.monorepo
    kind: concept
    name: pnpm monorepo
    description: pnpm workspaces spanning packages, turbopack, crates, test, and tooling

  - id: concept.next-framework
    kind: concept
    name: Next.js framework
    description: Full-stack React framework published as the next npm package

  - id: concept.turbopack
    kind: concept
    name: Turbopack
    description: Default bundler for next dev and next build

  - id: concept.agent-evals
    kind: concept
    name: Agent evals
    description: Sandbox coding-agent fixtures to test Next.js guidance quality

  - id: entrypoint.next-dev
    kind: entrypoint
    name: next dev
    path: packages/next/src/cli/next-dev.ts

  - id: entrypoint.next-start
    kind: entrypoint
    name: next start
    path: packages/next/src/cli/next-start.ts

  - id: entrypoint.next-build
    kind: entrypoint
    name: next build
    path: packages/next/src/cli/next-build.ts

  - id: script.build
    kind: script
    name: build
    command: pnpm build

  - id: script.build-all
    kind: script
    name: build-all
    command: pnpm build-all

  - id: script.next-dev
    kind: script
    name: next dev watch
    command: pnpm --filter=next dev

  - id: script.test-dev-turbo
    kind: script
    name: test-dev-turbo
    command: pnpm test-dev-turbo

  - id: script.test-dev-webpack
    kind: script
    name: test-dev-webpack
    command: pnpm test-dev-webpack

  - id: script.test-start-turbo
    kind: script
    name: test-start-turbo
    command: pnpm test-start-turbo

  - id: script.test-start-webpack
    kind: script
    name: test-start-webpack
    command: pnpm test-start-webpack

  - id: script.test-unit
    kind: script
    name: test-unit
    command: pnpm test-unit

  - id: script.lint
    kind: script
    name: lint
    command: pnpm lint

  - id: script.types
    kind: script
    name: types
    command: pnpm types

  - id: script.new-test
    kind: script
    name: new-test
    command: pnpm new-test

  - id: script.pr-status
    kind: script
    name: pr-status
    command: node scripts/pr-status.js

  - id: script.eval
    kind: script
    name: eval
    command: pnpm eval

  - id: instruction.agents
    kind: instruction
    name: AGENTS.md
    path: AGENTS.md

  - id: instruction.github-agents
    kind: instruction
    name: .github/AGENTS.md
    path: .github/AGENTS.md

relationships:
  - type: contains
    from: repository
    to: dir.packages
  - type: contains
    from: repository
    to: dir.turbopack
  - type: contains
    from: repository
    to: dir.crates
  - type: contains
    from: repository
    to: dir.rspack
  - type: contains
    from: repository
    to: dir.test
  - type: contains
    from: repository
    to: dir.examples
  - type: contains
    from: repository
    to: dir.docs
  - type: contains
    from: repository
    to: dir.scripts
  - type: contains
    from: repository
    to: dir.evals
  - type: contains
    from: repository
    to: dir.bench
  - type: contains
    from: repository
    to: dir.apps
  - type: contains
    from: repository
    to: dir.errors
  - type: contains
    from: repository
    to: dir.agents
  - type: contains
    from: repository
    to: dir.github

  - type: contains
    from: dir.packages
    to: dir.packages.next
  - type: contains
    from: dir.packages
    to: dir.packages.create-next-app
  - type: contains
    from: dir.packages
    to: dir.packages.next-swc
  - type: contains
    from: dir.packages
    to: dir.packages.font
  - type: contains
    from: dir.packages
    to: dir.packages.eslint-plugin-next
  - type: contains
    from: dir.packages
    to: dir.packages.third-parties
  - type: contains
    from: dir.packages.next
    to: dir.packages.next.src

  - type: contains
    from: dir.test
    to: dir.test.e2e
  - type: contains
    from: dir.test
    to: dir.test.development
  - type: contains
    from: dir.test
    to: dir.test.production
  - type: contains
    from: dir.test
    to: dir.test.unit

  - type: contains
    from: dir.docs
    to: dir.docs.app
  - type: contains
    from: dir.docs
    to: dir.docs.pages

  - type: implements
    from: dir.packages.next
    to: concept.next-framework
  - type: implements
    from: dir.turbopack
    to: concept.turbopack
  - type: implements
    from: dir.evals
    to: concept.agent-evals

  - type: uses
    from: concept.next-framework
    to: concept.turbopack
  - type: uses
    from: concept.monorepo
    to: dir.packages
  - type: uses
    from: concept.monorepo
    to: dir.turbopack
  - type: uses
    from: concept.monorepo
    to: dir.crates

  - type: invokes
    from: entrypoint.next-dev
    to: concept.next-framework
  - type: invokes
    from: entrypoint.next-start
    to: concept.next-framework
  - type: invokes
    from: entrypoint.next-build
    to: concept.next-framework

  - type: depends_on
    from: script.test-dev-turbo
    to: script.next-dev
  - type: depends_on
    from: script.test-dev-webpack
    to: script.next-dev
  - type: depends_on
    from: script.test-start-turbo
    to: script.build-all
  - type: depends_on
    from: script.test-start-webpack
    to: script.build-all
  - type: depends_on
    from: script.eval
    to: script.build

evidence:
  - entity: dir.packages
    sources: [AGENTS.md]
  - entity: dir.turbopack
    sources: [AGENTS.md]
  - entity: dir.crates
    sources: [AGENTS.md]
  - entity: dir.test
    sources: [AGENTS.md]
  - entity: dir.examples
    sources: [AGENTS.md]
  - entity: dir.docs
    sources: [AGENTS.md]
  - entity: dir.scripts
    sources: [AGENTS.md]
  - entity: dir.evals
    sources: [evals/README.md]
  - entity: concept.agent-evals
    sources: [evals/README.md]
  - entity: entrypoint.next-dev
    sources: [AGENTS.md]
  - entity: entrypoint.next-start
    sources: [AGENTS.md]
  - entity: entrypoint.next-build
    sources: [AGENTS.md]

observations:
  - Very large monorepo; depth-4 reveal still omits most of examples/ and turbopack/crates/.
  - AGENTS.md is the primary agent instruction surface; .github/AGENTS.md mirrors it.
  - Turbopack is default bundler; webpack and rspack remain selectable for tests and builds.
  - Integration tests are mode- and bundler-specific (dev vs start, turbo vs webpack vs rspack).
  - evals/ runs coding-agent fixtures via @vercel/agent-eval and run-evals.js.
